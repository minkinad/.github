name: Feature request
description: Propose an improvement or a new capability
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        For bigger features or API changes, an issue like this is the right place to align before code is written.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem are you trying to solve?
      placeholder: Describe the current limitation, pain point, or missed use case
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Describe the feature at a high level
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
      placeholder: Existing workarounds, competing ideas, or reasons to avoid this feature
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add examples, references, screenshots, or prior discussion if useful.
  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions before opening this request.
          required: true
        - label: I understand this issue is for proposing a change, not for generic support.
          required: true
        - label: I am willing to help clarify the feature if follow-up questions come up.
          required: false
